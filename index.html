<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HotPot Widget Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        color: white;
        margin-bottom: 60px;
      }

      .hero h1 {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      .hero p {
        font-size: 20px;
        opacity: 0.9;
        margin-bottom: 32px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        gap: 40px;
        margin-bottom: 60px;
      }

      .demo-card {
        background: gray;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .demo-card h3 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #1a1b1e;
      }

      .demo-card p {
        color: #6c757d;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .demo-card-title {
        font-size: 24px;
        margin-bottom: 12px;
        color: #1a1b1e;
      }

      .widget-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .code-section {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .code-section h3 {
        font-size: 24px;
        margin-bottom: 16px;
        color: #1a1b1e;
      }

      .code-block {
        background: #1a1b1e;
        color: #fff;
        padding: 20px;
        border-radius: 12px;
        overflow-x: auto;
        font-family: "Monaco", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .code-block pre {
        margin: 0;
      }

      .code-comment {
        color: #6c757d;
      }

      .code-tag {
        color: #51cf66;
      }

      .code-attr {
        color: #ffa94d;
      }

      .code-value {
        color: #748ffc;
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 32px;
        }

        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Hero Section -->
      <div class="hero">
        <h1>HotPot Swap Widget</h1>
      </div>
